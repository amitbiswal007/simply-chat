<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 90vh;
            text-align: center;
            color: darkslateblue;
        }
        #messages-container{
            height: 60vh;
            display: inline-block;
            text-align: left;
            border: 1px solid black;
            border-radius: 10px;
            padding: 10px;
            color: darkslateblue;
            
        }
        #messageInput, #sendBtn, #username, #messages-container {
            width: 500px;
            border-radius: 5px;
            margin: 2px;
        }
    </style>
</head>

<body>
    <h1>Simply Chat</h1>

    <div id="messages-container">
    </div>

    <div>
        <input type="text" id="username" placeholder="Enter your username" value="John">
        <br>
        <textarea id="messageInput" rows="4" placeholder="Enter your chat message"></textarea>
        <br>
        <button type="submit" id="sendBtn">Send</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>

        const socket = io();

        const messages = document.getElementById('messages-container');

        const username = document.getElementById('username')
        const messageInput = document.getElementById('messageInput')
        const sendBtn = document.getElementById('sendBtn');

        sendBtn.addEventListener('click', () => {
            let messageWithUsername = username.value + " : " + messageInput.value

            console.log("Sending message to server", messageWithUsername);
            socket.emit('message', messageWithUsername)
        })


        socket.on('message', (message) => {
            console.log('Message received from server: ', message)

            const messageDiv = document.createElement('div')
            messageDiv.textContent = message;
            messages.appendChild(messageDiv)

        })

    </script>
</body>

</html>
